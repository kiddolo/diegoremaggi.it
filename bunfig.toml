# Bun configuration for chirping-astro
# https://bun.sh/docs/runtime/bunfig

[install]
# Use exact dependency versions in lockfile, but allow ranges in package.json
exact = false
# Save peer dependencies
peer = true
# Prevent supply chain attacks
minimumReleaseAge = 86400

[install.cache]
disable = false

[run]
bun = true
silent = false
